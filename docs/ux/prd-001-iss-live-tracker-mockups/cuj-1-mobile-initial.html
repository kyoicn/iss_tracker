<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ISS — Zarya · mobile locating (cuj-1-mobile-initial)</title>
  <meta name="viewport" content="width=390" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
      min-width: 390px;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

    /* mobile device frame */
    .device {
      position: relative;
      width: 390px; height: 844px;
      margin: 0 auto;
      background: #0a0f17;
      overflow: hidden;
      border-radius: 0;
    }

    /* faux mobile status bar (so the mock reads as a phone screen) */
    .statusbar {
      position: absolute; top: 0; left: 0; right: 0; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px 0;
      font-size: 14px; font-weight: 600; color: #f0f6fc; z-index: 30;
      pointer-events: none;
    }
    .statusbar .time { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .statusbar .right { display: flex; align-items: center; gap: 6px; }
    .statusbar svg { display: block; }

    /* MAP */
    .map { position: absolute; inset: 0; background: #0a0f17; overflow: hidden; }
    .map-svg { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); width: 100%; height: auto; display: block; }
    .stars { position: absolute; inset: 0; pointer-events: none; opacity: .35;
      background-image:
        radial-gradient(1px 1px at 18% 14%, rgba(255,255,255,.6) 50%, transparent 51%),
        radial-gradient(1px 1px at 62% 8%, rgba(255,255,255,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 35% 86%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 78% 92%, rgba(255,255,255,.35) 50%, transparent 51%),
        radial-gradient(1px 1px at 12% 70%, rgba(255,255,255,.35) 50%, transparent 51%),
        radial-gradient(1px 1px at 92% 60%, rgba(255,255,255,.3) 50%, transparent 51%);
    }
    .vignette { position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(180deg, rgba(13,17,23,.7) 0%, transparent 18%, transparent 78%, rgba(13,17,23,.75) 100%);
    }

    .glass { background: rgba(22,27,34,.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(240,246,252,.08); }
    .glass-soft { background: rgba(22,27,34,.62); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(240,246,252,.08); }

    /* top chrome */
    .top-chrome {
      position: absolute; top: 54px; left: 0; right: 0;
      padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      z-index: 20;
    }
    .title-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 10px;
    }
    .title-chip .sat-icon { color: #7dd3fc; opacity: .9; }
    .title-chip .name { font-size: 13px; font-weight: 500; color: #e6edf3; line-height: 1.2; }
    .title-chip .sub { margin-top: 2px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.14em; text-transform: uppercase; }

    .follow {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 11px 6px 7px; border-radius: 999px; width: 108px;
    }
    .switch { display:inline-block; width:24px; height:14px; border-radius:999px; background:#30363d; position:relative; flex:0 0 auto; }
    .switch::after { content:""; position:absolute; top:2px; left:2px; width:10px; height:10px; border-radius:999px; background:#c9d1d9; }
    .follow .label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #c9d1d9; }
    .follow .state { margin-left: auto; font-size: 8.5px; color: #6e7681; }

    /* center placeholder */
    .map-placeholder {
      position: absolute; left: 50%; top: 46%; transform: translate(-50%, -50%);
      padding: 6px 11px; border-radius: 6px;
      font-size: 10px; color: #8b949e; letter-spacing: 0.10em; text-transform: uppercase;
      pointer-events: none; z-index: 10;
      text-align: center; line-height: 1.5;
    }

    /* BOTTOM SHEET — collapsed */
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(17, 22, 31, 0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(240,246,252,.08);
      border-top-left-radius: 18px; border-top-right-radius: 18px;
      box-shadow: 0 -16px 36px -16px rgba(0,0,0,.45);
      padding: 8px 18px 28px;
      z-index: 25;
    }
    .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: #30363d; margin: 0 auto 10px; }
    .sheet-row {
      display: flex; align-items: center; gap: 12px;
      padding: 4px 2px 2px;
    }
    .sheet-row .status {
      display: inline-flex; align-items: center; gap: 7px;
      flex: 0 0 auto;
    }
    .pill-dot {
      display:inline-block; width:7px; height:7px; border-radius:999px; background:#8b949e;
    }
    @keyframes mutedPulse { 0%,100%{opacity:.45;} 50%{opacity:1;} }
    .pill-dot.locating { animation: mutedPulse 1.8s ease-in-out infinite; }
    .sheet-row .status-label {
      font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #c9d1d9; font-weight: 500;
    }
    .sheet-row .coords {
      flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0;
    }
    .sheet-row .vis-stub { display: inline-block; width: 16px; height: 16px; border-radius: 999px; background: rgba(139,148,158,.10); border: 1px dashed rgba(139,148,158,.35); flex: 0 0 auto; }
    .sheet-row .timestamp { font-size: 11px; color: #6e7681; font-weight: 500; }

    /* skeleton shimmer */
    @keyframes shimmer { 0% { background-position: -180% 0; } 100% { background-position: 180% 0; } }
    .sk {
      display: inline-block; border-radius: 4px;
      background: linear-gradient(90deg, rgba(139,148,158,.10) 0%, rgba(139,148,158,.28) 45%, rgba(139,148,158,.10) 100%);
      background-size: 220% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
    }

    /* chevron above sheet, hinting "swipe up to expand" */
    .chevron-hint {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 104px; z-index: 24;
      color: #6e7681; opacity: .7;
    }

    /* attribution above sheet */
    .attribution {
      position: absolute; left: 16px; right: 16px;
      bottom: 122px; font-size: 10px; color: #6e7681; text-align: center; z-index: 22;
    }

    /* home indicator faux */
    .home-indicator {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px; border-radius: 999px; background: #f0f6fc; opacity: .45;
      z-index: 40;
    }
  </style>
</head>
<body>
  <div class="device">

    <!-- MAP (full bleed) -->
    <div class="map">
      <div class="stars"></div>
      <svg class="map-svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <linearGradient id="seaGradM" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0f17"/>
            <stop offset="100%" stop-color="#0e1421"/>
          </linearGradient>
          <pattern id="gridM" width="83.33" height="83.33" patternUnits="userSpaceOnUse">
            <path d="M 83.33 0 L 0 0 0 83.33" fill="none" stroke="#161c2a" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="1000" height="500" fill="url(#seaGradM)"/>
        <rect width="1000" height="500" fill="url(#gridM)"/>
        <line x1="0" y1="250" x2="1000" y2="250" stroke="#1b2436" stroke-width="0.8" opacity=".7"/>
        <line x1="500" y1="0" x2="500" y2="500" stroke="#1b2436" stroke-width="0.8" opacity=".7"/>
        <line x1="0" y1="185" x2="1000" y2="185" stroke="#141a28" stroke-width="0.6" opacity=".6"/>
        <line x1="0" y1="315" x2="1000" y2="315" stroke="#141a28" stroke-width="0.6" opacity=".6"/>

        <g fill="#1d2638" stroke="#2f3b54" stroke-width="0.7" stroke-linejoin="round">
          <path d="M55,120 L80,108 L110,95 L150,92 L175,98 L150,118 L160,128 L195,118 L230,112 L268,118 L295,135 L310,158 L305,178 L292,195 L270,205 L255,220 L248,238 L235,245 L218,245 L205,250 L200,265 L210,278 L208,288 L195,283 L182,272 L178,258 L168,250 L155,240 L142,228 L128,218 L115,205 L105,188 L92,170 L82,150 L70,138 Z"/>
          <path d="M335,75 L375,72 L395,90 L390,118 L365,135 L335,128 L325,108 Z"/>
          <path d="M208,288 L222,295 L235,305 L248,315 L255,322 L248,328 L235,322 L222,312 L212,302 Z"/>
          <path d="M255,322 L278,318 L298,322 L320,335 L335,355 L340,378 L335,402 L325,425 L312,445 L298,460 L285,468 L275,460 L272,440 L278,418 L282,395 L278,372 L270,352 L262,338 Z"/>
          <path d="M470,140 L488,128 L505,125 L520,118 L538,120 L552,128 L568,135 L555,148 L548,158 L555,168 L548,178 L530,180 L515,178 L500,182 L488,178 L478,168 L470,158 Z"/>
          <path d="M470,172 L478,170 L482,180 L470,184 Z"/>
          <path d="M495,195 L530,190 L560,195 L585,210 L600,235 L598,260 L585,285 L570,310 L558,332 L548,355 L535,375 L520,388 L508,378 L498,358 L490,335 L482,305 L478,278 L478,250 L482,220 Z"/>
          <path d="M608,330 L618,340 L615,360 L605,355 Z"/>
          <path d="M555,135 L590,125 L625,118 L665,115 L705,118 L745,125 L780,135 L815,145 L840,158 L855,175 L850,195 L830,208 L805,215 L775,220 L745,225 L720,232 L700,228 L685,218 L670,212 L658,222 L645,232 L632,228 L618,220 L605,210 L595,198 L585,188 L575,175 L565,162 L558,148 Z"/>
          <path d="M688,228 L712,232 L722,250 L715,272 L702,285 L688,278 L680,258 Z"/>
          <path d="M780,255 L805,255 L830,262 L850,272 L840,285 L815,288 L788,282 L772,272 Z"/>
          <path d="M860,272 L878,272 L885,282 L872,290 L858,285 Z"/>
          <path d="M868,170 L880,165 L885,178 L882,195 L872,200 L862,188 Z"/>
          <path d="M778,338 L815,330 L850,332 L878,342 L890,358 L885,378 L860,388 L820,388 L788,378 L772,360 Z"/>
          <path d="M905,400 L915,398 L918,412 L908,420 Z"/>
          <path d="M912,420 L920,420 L922,432 L912,438 Z"/>
          <path d="M20,475 L100,465 L200,468 L310,463 L420,470 L530,465 L640,470 L750,465 L860,470 L975,468 L975,498 L20,498 Z"/>
        </g>
      </svg>
      <div class="vignette"></div>
    </div>

    <!-- faux iOS status bar -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="right">
        <!-- cellular -->
        <svg width="17" height="10" viewBox="0 0 17 11"><g fill="#f0f6fc"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="4" y="5" width="3" height="6" rx=".5"/><rect x="8" y="3" width="3" height="8" rx=".5"/><rect x="12" y="0" width="3" height="11" rx=".5"/></g></svg>
        <!-- wifi -->
        <svg width="16" height="11" viewBox="0 0 16 11" fill="#f0f6fc"><path d="M8 11l2.1-2.1a3 3 0 0 0-4.2 0L8 11zm0-4.4a6 6 0 0 1 4.2 1.7l1.5-1.5a8 8 0 0 0-11.4 0l1.5 1.5A6 6 0 0 1 8 6.6zm0-3.6A10 10 0 0 1 15.1 4.9L16.6 3.4a12 12 0 0 0-17.2 0L1.0 4.9A10 10 0 0 1 8 3z"/></svg>
        <!-- battery -->
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x=".5" y=".5" width="21" height="10" rx="2.5" stroke="#f0f6fc" opacity=".6"/><rect x="22.5" y="3.5" width="2" height="4" rx=".5" fill="#f0f6fc" opacity=".6"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#f0f6fc"/></svg>
      </div>
    </div>

    <!-- top chrome (title chip + follow toggle) -->
    <div class="top-chrome">
      <div class="title-chip glass">
        <svg class="sat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="6" height="6" rx="1"/>
          <path d="M9 9 L3 3 M15 9 L21 3 M9 15 L3 21 M15 15 L21 21"/>
          <circle cx="3" cy="3" r="1.4"/><circle cx="21" cy="3" r="1.4"/>
          <circle cx="3" cy="21" r="1.4"/><circle cx="21" cy="21" r="1.4"/>
        </svg>
        <div>
          <div class="name">ISS — Zarya</div>
          <div class="sub mono">Locating ISS…</div>
        </div>
      </div>

      <div class="follow glass">
        <span class="switch"></span>
        <span class="label">Follow</span>
        <span class="state mono">OFF</span>
      </div>
    </div>

    <!-- map placeholder (center) -->
    <div class="map-placeholder glass-soft mono">
      [ Map placeholder ]<br/>
      <span style="opacity:.7; font-size:9px;">Leaflet · dark OSM · world view</span>
    </div>

    <!-- attribution -->
    <div class="attribution mono">Data: wheretheiss.at · Map: OpenStreetMap</div>

    <!-- chevron-up hint above sheet -->
    <div class="chevron-hint">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2 10 9 3 16 10"/>
      </svg>
    </div>

    <!-- BOTTOM SHEET (collapsed, locating state) -->
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-row">
        <div class="status">
          <span class="pill-dot locating"></span>
          <span class="status-label">Locating</span>
        </div>
        <div class="coords">
          <span class="sk" style="width:54px; height:14px;"></span>
          <span class="sk" style="width:54px; height:14px;"></span>
        </div>
        <span class="vis-stub"></span>
        <span class="timestamp mono">—</span>
      </div>
    </div>

    <!-- home indicator -->
    <div class="home-indicator"></div>
  </div>
</body>
</html>
