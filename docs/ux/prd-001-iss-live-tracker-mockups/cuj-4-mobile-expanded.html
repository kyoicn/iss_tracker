<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ISS — Zarya · mobile sheet expanded (cuj-4-mobile-expanded)</title>
  <meta name="viewport" content="width=390" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #e6edf3; min-width: 390px; -webkit-font-smoothing: antialiased; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

    .device { position: relative; width: 390px; height: 844px; margin: 0 auto; background: #0a0f17; overflow: hidden; }
    .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 14px 22px 0; font-size: 14px; font-weight: 600; color: #f0f6fc; z-index: 30; pointer-events: none; }
    .statusbar .time { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .statusbar .right { display: flex; align-items: center; gap: 6px; }

    .map { position: absolute; inset: 0; background: #0a0f17; overflow: hidden; }
    .map-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .stars { position: absolute; inset: 0; pointer-events: none; opacity: .35;
      background-image:
        radial-gradient(1px 1px at 18% 14%, rgba(255,255,255,.6) 50%, transparent 51%),
        radial-gradient(1px 1px at 62% 8%, rgba(255,255,255,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,.4) 50%, transparent 51%);
    }
    .vignette { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(13,17,23,.7) 0%, transparent 18%, transparent 50%, rgba(13,17,23,.55) 60%); }

    /* dim map when sheet is expanded */
    .map-dim { position: absolute; inset: 0; pointer-events: none; background: rgba(13,17,23,.30); }

    .glass { background: rgba(22,27,34,.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(240,246,252,.08); }
    .glass-soft { background: rgba(22,27,34,.62); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(240,246,252,.08); }

    .top-chrome { position: absolute; top: 54px; left: 0; right: 0; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 20; }
    .title-chip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; }
    .title-chip .sat-icon { color: #7dd3fc; opacity: .9; }
    .title-chip .name { font-size: 13px; font-weight: 500; color: #e6edf3; line-height: 1.2; }
    .title-chip .sub { margin-top: 2px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.14em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .live-dot-sm { display:inline-block; width:6px; height:6px; border-radius:999px; background:#22c55e; box-shadow: 0 0 6px rgba(34,197,94,.7); }

    .follow { display: flex; align-items: center; gap: 7px; padding: 6px 11px 6px 7px; border-radius: 999px; width: 108px; border-color: rgba(125,211,252,.45); }
    .switch { display:inline-block; width:24px; height:14px; border-radius:999px; background:#0c3a4a; position:relative; flex:0 0 auto; }
    .switch::after { content:""; position:absolute; top:2px; left:12px; width:10px; height:10px; border-radius:999px; background:#7dd3fc; box-shadow: 0 0 8px rgba(125,211,252,.7); }
    .follow .label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #c9d1d9; }
    .follow .state { margin-left: auto; font-size: 8.5px; color: #7dd3fc; }

    .iss-marker { position: absolute; left: 50%; top: 28%; width: 11px; height: 11px; border-radius: 999px; background: #22d3ee; box-shadow: 0 0 12px 4px rgba(34,211,238,.55); transform: translate(-50%, -50%); z-index: 18; }
    .iss-marker::after { content:""; position:absolute; inset:-14px; border-radius:999px; border: 1px solid rgba(34,211,238,.35); animation: markerHalo 2.2s ease-out infinite; }
    @keyframes markerHalo { 0%{transform:scale(.7); opacity:.9;} 80%{transform:scale(1.4); opacity:0;} 100%{opacity:0;} }

    .map-placeholder { position: absolute; left: 50%; top: 16%; transform: translateX(-50%); padding: 5px 10px; border-radius: 6px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.1em; text-transform: uppercase; pointer-events: none; z-index: 10; }

    /* BOTTOM SHEET — expanded (~50% = 422px) */
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0; height: 470px;
      background: rgba(17, 22, 31, 0.97);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(240,246,252,.10);
      border-top-left-radius: 22px; border-top-right-radius: 22px;
      box-shadow: 0 -20px 50px -16px rgba(0,0,0,.6);
      padding: 8px 20px 26px;
      z-index: 25;
      display: flex; flex-direction: column;
    }
    .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: #30363d; margin: 0 auto 14px; }
    .sheet-header { display: flex; align-items: center; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid rgba(240,246,252,.06); }
    .sheet-title { flex: 1; min-width: 0; }
    .sheet-title h1 { margin: 0; font-size: 18px; font-weight: 600; color: #f0f6fc; letter-spacing: -0.01em; }
    .sheet-title .sub { font-size: 11px; color: #8b949e; margin-top: 3px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px 4px 6px; border-radius: 999px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
    .pill-live { background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.30); }
    .pill-live .dot { display:inline-block; width:6px; height:6px; border-radius:999px; background:#22c55e; }
    @keyframes livePulse { 0%,100%{opacity:.65; box-shadow:0 0 4px rgba(34,197,94,.5);} 50%{opacity:1; box-shadow:0 0 10px rgba(34,197,94,.85);} }
    .pill-live .dot { animation: livePulse 1.5s ease-in-out infinite; }
    .chev-down { color: #8b949e; }

    /* Telemetry 2x3 grid */
    .tg { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tg .cell { padding: 12px 14px; background: #1a212e; border: 1px solid rgba(240,246,252,.06); border-radius: 10px; }
    .tg .label { display:flex; align-items:center; gap:7px; color:#8b949e; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
    .tg .label svg { color: #8b949e; opacity: .8; }
    .tg .value { margin-top: 6px; display:flex; align-items: baseline; gap: 5px; color: #f0f6fc; font-size: 19px; font-weight: 500; letter-spacing: -0.01em; }
    .tg .value .num { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .tg .unit { font-size: 11px; color: #6e7681; font-weight: 500; }
    .tg .vis-row { display:flex; align-items:center; gap:7px; margin-top:6px; color:#f0f6fc; font-size:17px; font-weight: 500; }
    .sun-icon { color: #f59e0b; filter: drop-shadow(0 0 5px rgba(245,158,11,.45)); }

    .sheet-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid rgba(240,246,252,.06); display:flex; align-items: center; justify-content: space-between; font-size: 10px; color: #6e7681; }
    .sheet-footer .src { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 999px; background: #f0f6fc; opacity: .45; z-index: 40; }
  </style>
</head>
<body>
  <div class="device">
    <div class="map">
      <div class="stars"></div>
      <svg class="map-svg" viewBox="703 -143 250 540" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <linearGradient id="seaGradMX" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0f17"/><stop offset="100%" stop-color="#0e1421"/></linearGradient>
          <pattern id="gridMX" width="55.55" height="55.55" patternUnits="userSpaceOnUse"><path d="M 55.55 0 L 0 0 0 55.55" fill="none" stroke="#161c2a" stroke-width="0.5"/></pattern>
        </defs>
        <rect x="-200" y="-300" width="2000" height="1200" fill="url(#seaGradMX)"/>
        <rect x="-200" y="-300" width="2000" height="1200" fill="url(#gridMX)"/>
        <g fill="#1d2638" stroke="#2f3b54" stroke-width="0.7" stroke-linejoin="round">
          <path d="M555,135 L590,125 L625,118 L665,115 L705,118 L745,125 L780,135 L815,145 L840,158 L855,175 L850,195 L830,208 L805,215 L775,220 L745,225 L720,232 L700,228 L685,218 L670,212 L658,222 L645,232 L632,228 L618,220 L605,210 L595,198 L585,188 L575,175 L565,162 L558,148 Z"/>
          <path d="M688,228 L712,232 L722,250 L715,272 L702,285 L688,278 L680,258 Z"/>
        </g>
        <g font-family="ui-sans-serif, system-ui" font-size="8" fill="#3b4a66" letter-spacing="1.5">
          <text x="730" y="160">RUSSIA</text>
          <text x="720" y="200">MONGOLIA</text>
          <text x="715" y="245">CHINA</text>
        </g>
      </svg>
      <div class="vignette"></div>
      <div class="map-dim"></div>
    </div>

    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="right">
        <svg width="17" height="10" viewBox="0 0 17 11"><g fill="#f0f6fc"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="4" y="5" width="3" height="6" rx=".5"/><rect x="8" y="3" width="3" height="8" rx=".5"/><rect x="12" y="0" width="3" height="11" rx=".5"/></g></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="#f0f6fc"><path d="M8 11l2.1-2.1a3 3 0 0 0-4.2 0L8 11zm0-4.4a6 6 0 0 1 4.2 1.7l1.5-1.5a8 8 0 0 0-11.4 0l1.5 1.5A6 6 0 0 1 8 6.6zm0-3.6A10 10 0 0 1 15.1 4.9L16.6 3.4a12 12 0 0 0-17.2 0L1.0 4.9A10 10 0 0 1 8 3z"/></svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x=".5" y=".5" width="21" height="10" rx="2.5" stroke="#f0f6fc" opacity=".6"/><rect x="22.5" y="3.5" width="2" height="4" rx=".5" fill="#f0f6fc" opacity=".6"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#f0f6fc"/></svg>
      </div>
    </div>

    <div class="top-chrome">
      <div class="title-chip glass">
        <svg class="sat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="6" height="6" rx="1"/>
          <path d="M9 9 L3 3 M15 9 L21 3 M9 15 L3 21 M15 15 L21 21"/>
          <circle cx="3" cy="3" r="1.4"/><circle cx="21" cy="3" r="1.4"/><circle cx="3" cy="21" r="1.4"/><circle cx="21" cy="21" r="1.4"/>
        </svg>
        <div><div class="name">ISS — Zarya</div><div class="sub mono"><span class="live-dot-sm"></span>Live tracking</div></div>
      </div>
      <div class="follow glass"><span class="switch"></span><span class="label">Follow</span><span class="state mono">ON</span></div>
    </div>

    <div class="iss-marker"></div>
    <div class="map-placeholder glass-soft mono">[ Map placeholder · zoom 3 ]</div>

    <!-- EXPANDED SHEET -->
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">
          <h1>ISS — Zarya</h1>
          <div class="sub">Over Mongolia · 408&thinsp;km · just now</div>
        </div>
        <span class="pill pill-live"><span class="dot"></span>Live</span>
        <svg class="chev-down" width="22" height="14" viewBox="0 0 22 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg);">
          <polyline points="3 11 11 4 19 11"/>
        </svg>
      </div>

      <div class="tg">
        <!-- LATITUDE -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h18"/><path d="M5 8h14M5 16h14" opacity=".5"/></svg>Latitude</div>
          <div class="value"><span class="num">50.1</span><span class="unit mono">° N</span></div>
        </div>
        <!-- LONGITUDE -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18"/><path d="M8 5v14M16 5v14" opacity=".5"/></svg>Longitude</div>
          <div class="value"><span class="num">118.1</span><span class="unit mono">° E</span></div>
        </div>
        <!-- ALTITUDE -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l4 6h-3v12h-2V9H8z"/></svg>Altitude</div>
          <div class="value"><span class="num">408</span><span class="unit mono">km</span></div>
        </div>
        <!-- VELOCITY -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h13M11 7l5 5-5 5"/></svg>Velocity</div>
          <div class="value"><span class="num">27,600</span><span class="unit mono">km/h</span></div>
        </div>
        <!-- VISIBILITY -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4"/></svg>Visibility</div>
          <div class="vis-row">
            <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2 2M17.4 17.4l2 2M4.6 19.4l2-2M17.4 6.6l2-2"/>
            </svg>
            <span>Daylight</span>
          </div>
        </div>
        <!-- LAST UPDATED -->
        <div class="cell">
          <div class="label"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Last updated</div>
          <div class="value"><span class="num" style="font-size:17px;">just now</span></div>
        </div>
      </div>

      <div class="sheet-footer">
        <span class="src">wheretheiss.at · v1</span>
        <span>Data: wheretheiss.at · Map: OSM</span>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
