<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ISS — Zarya · mobile live (cuj-1-mobile-loaded)</title>
  <meta name="viewport" content="width=390" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
      min-width: 390px;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

    .device { position: relative; width: 390px; height: 844px; margin: 0 auto; background: #0a0f17; overflow: hidden; }

    .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 14px 22px 0; font-size: 14px; font-weight: 600; color: #f0f6fc; z-index: 30; pointer-events: none; }
    .statusbar .time { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .statusbar .right { display: flex; align-items: center; gap: 6px; }
    .statusbar svg { display: block; }

    .map { position: absolute; inset: 0; background: #0a0f17; overflow: hidden; }
    .map-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .stars { position: absolute; inset: 0; pointer-events: none; opacity: .35;
      background-image:
        radial-gradient(1px 1px at 18% 14%, rgba(255,255,255,.6) 50%, transparent 51%),
        radial-gradient(1px 1px at 62% 8%, rgba(255,255,255,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 88% 22%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 35% 86%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 78% 92%, rgba(255,255,255,.35) 50%, transparent 51%),
        radial-gradient(1px 1px at 12% 70%, rgba(255,255,255,.35) 50%, transparent 51%);
    }
    .vignette { position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(180deg, rgba(13,17,23,.7) 0%, transparent 18%, transparent 78%, rgba(13,17,23,.75) 100%);
    }

    .glass { background: rgba(22,27,34,.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(240,246,252,.08); }
    .glass-soft { background: rgba(22,27,34,.62); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(240,246,252,.08); }

    .top-chrome { position: absolute; top: 54px; left: 0; right: 0; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 20; }
    .title-chip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; }
    .title-chip .sat-icon { color: #7dd3fc; opacity: .9; }
    .title-chip .name { font-size: 13px; font-weight: 500; color: #e6edf3; line-height: 1.2; }
    .title-chip .sub { margin-top: 2px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.14em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .live-dot-sm { display:inline-block; width:6px; height:6px; border-radius:999px; background:#22c55e; box-shadow: 0 0 6px rgba(34,197,94,.7); }

    .follow { display: flex; align-items: center; gap: 7px; padding: 6px 11px 6px 7px; border-radius: 999px; width: 108px; }
    .follow.on { border-color: rgba(125,211,252,.45); }
    .switch { display:inline-block; width:24px; height:14px; border-radius:999px; background:#30363d; position:relative; flex:0 0 auto; }
    .switch::after { content:""; position:absolute; top:2px; left:2px; width:10px; height:10px; border-radius:999px; background:#c9d1d9; }
    .switch.on { background: #0c3a4a; }
    .switch.on::after { left: 12px; background: #7dd3fc; box-shadow: 0 0 8px rgba(125,211,252,.7); }
    .follow .label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #c9d1d9; }
    .follow .state { margin-left: auto; font-size: 8.5px; color: #6e7681; }
    .follow.on .state { color: #7dd3fc; }

    /* ISS marker */
    .iss-marker {
      position: absolute; left: 50%; top: 47%;
      width: 12px; height: 12px; border-radius: 999px;
      background: #22d3ee;
      box-shadow: 0 0 14px 5px rgba(34,211,238,.55), 0 0 32px 12px rgba(34,211,238,.18);
      transform: translate(-50%, -50%);
      z-index: 18;
    }
    .iss-marker::after {
      content:""; position:absolute; inset:-16px; border-radius:999px;
      border: 1px solid rgba(34,211,238,.35);
      animation: markerHalo 2.2s ease-out infinite;
    }
    @keyframes markerHalo {
      0% { transform: scale(.7); opacity: .9; }
      80% { transform: scale(1.4); opacity: 0; }
      100% { opacity: 0; }
    }
    .marker-label {
      position: absolute; left: calc(50% + 18px); top: calc(47% - 16px);
      padding: 4px 8px; border-radius: 6px;
      font-size: 10px; color: #e6edf3; letter-spacing: 0.10em; text-transform: uppercase; font-weight: 500;
      z-index: 18;
    }

    .map-placeholder {
      position: absolute; right: 14px; top: 110px;
      padding: 5px 10px; border-radius: 6px;
      font-size: 9.5px; color: #8b949e; letter-spacing: 0.1em; text-transform: uppercase;
      pointer-events: none; z-index: 10;
    }

    .attribution { position: absolute; left: 16px; right: 16px; bottom: 122px; font-size: 10px; color: #6e7681; text-align: center; z-index: 22; }

    /* BOTTOM SHEET — collapsed, loaded state */
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(17, 22, 31, 0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(240,246,252,.08);
      border-top-left-radius: 18px; border-top-right-radius: 18px;
      box-shadow: 0 -16px 36px -16px rgba(0,0,0,.45);
      padding: 8px 18px 28px;
      z-index: 25;
    }
    .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: #30363d; margin: 0 auto 12px; }
    .sheet-row { display: flex; align-items: center; gap: 12px; padding: 2px 2px 4px; }
    .sheet-row .status { display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto; }
    .live-dot {
      display:inline-block; width:7px; height:7px; border-radius:999px; background:#22c55e;
    }
    @keyframes livePulse { 0%,100%{opacity:.65; box-shadow:0 0 4px rgba(34,197,94,.5);} 50%{opacity:1; box-shadow:0 0 10px rgba(34,197,94,.85);} }
    .live-dot { animation: livePulse 1.5s ease-in-out infinite; }
    .sheet-row .status-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #86efac; font-weight: 500; }
    .sheet-row .coords {
      flex: 1; display: flex; align-items: baseline; gap: 8px; min-width: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
      color: #f0f6fc; font-size: 14px; font-weight: 500;
      letter-spacing: 0.01em;
    }
    .sheet-row .sun-icon { color: #f59e0b; filter: drop-shadow(0 0 5px rgba(245,158,11,.45)); flex: 0 0 auto; }
    .sheet-row .timestamp { font-size: 11px; color: #8b949e; font-weight: 500; }

    /* chevron above sheet */
    .chevron-hint { position: absolute; left: 50%; transform: translateX(-50%); bottom: 104px; z-index: 24; color: #6e7681; opacity: .7; }

    .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; border-radius: 999px; background: #f0f6fc; opacity: .45; z-index: 40; }
  </style>
</head>
<body>
  <div class="device">

    <!-- MAP -->
    <div class="map">
      <div class="stars"></div>
      <!-- viewBox positioned so ISS (full-map coord 828, 111) lands at device 50%, 47%
           viewBox AR = 250:540 ≈ 1:2.16 matches device 390:844 -->
      <svg class="map-svg" viewBox="703 -143 250 540" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <linearGradient id="seaGradML" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0f17"/>
            <stop offset="100%" stop-color="#0e1421"/>
          </linearGradient>
          <pattern id="gridML" width="55.55" height="55.55" patternUnits="userSpaceOnUse">
            <path d="M 55.55 0 L 0 0 0 55.55" fill="none" stroke="#161c2a" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect x="-200" y="-300" width="2000" height="1200" fill="url(#seaGradML)"/>
        <rect x="-200" y="-300" width="2000" height="1200" fill="url(#gridML)"/>
        <line x1="-200" y1="250" x2="1400" y2="250" stroke="#1b2436" stroke-width="0.8" opacity=".7"/>
        <line x1="-200" y1="185" x2="1400" y2="185" stroke="#141a28" stroke-width="0.6" opacity=".6"/>
        <line x1="-200" y1="315" x2="1400" y2="315" stroke="#141a28" stroke-width="0.6" opacity=".6"/>

        <g fill="#1d2638" stroke="#2f3b54" stroke-width="0.7" stroke-linejoin="round">
          <!-- Asia (main central blob centered on ISS) -->
          <path d="M555,135 L590,125 L625,118 L665,115 L705,118 L745,125 L780,135 L815,145 L840,158 L855,175 L850,195 L830,208 L805,215 L775,220 L745,225 L720,232 L700,228 L685,218 L670,212 L658,222 L645,232 L632,228 L618,220 L605,210 L595,198 L585,188 L575,175 L565,162 L558,148 Z"/>
          <!-- India -->
          <path d="M688,228 L712,232 L722,250 L715,272 L702,285 L688,278 L680,258 Z"/>
          <!-- SE Asia -->
          <path d="M780,255 L805,255 L830,262 L850,272 L840,285 L815,288 L788,282 L772,272 Z"/>
          <path d="M860,272 L878,272 L885,282 L872,290 L858,285 Z"/>
          <!-- Japan -->
          <path d="M868,170 L880,165 L885,178 L882,195 L872,200 L862,188 Z"/>
          <!-- Australia (partial, bottom) -->
          <path d="M778,338 L815,330 L850,332 L878,342 L890,358 L885,378 L860,388 L820,388 L788,378 L772,360 Z"/>
        </g>

        <!-- faint country labels -->
        <g font-family="ui-sans-serif, system-ui" font-size="8" fill="#3b4a66" letter-spacing="1.5">
          <text x="730" y="160">RUSSIA</text>
          <text x="720" y="200">MONGOLIA</text>
          <text x="715" y="245">CHINA</text>
          <text x="697" y="265">INDIA</text>
          <text x="855" y="190">JAPAN</text>
          <text x="815" y="365">AUS.</text>
        </g>
      </svg>
      <div class="vignette"></div>
    </div>

    <!-- iOS status bar -->
    <div class="statusbar">
      <span class="time">9:41</span>
      <div class="right">
        <svg width="17" height="10" viewBox="0 0 17 11"><g fill="#f0f6fc"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="4" y="5" width="3" height="6" rx=".5"/><rect x="8" y="3" width="3" height="8" rx=".5"/><rect x="12" y="0" width="3" height="11" rx=".5"/></g></svg>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="#f0f6fc"><path d="M8 11l2.1-2.1a3 3 0 0 0-4.2 0L8 11zm0-4.4a6 6 0 0 1 4.2 1.7l1.5-1.5a8 8 0 0 0-11.4 0l1.5 1.5A6 6 0 0 1 8 6.6zm0-3.6A10 10 0 0 1 15.1 4.9L16.6 3.4a12 12 0 0 0-17.2 0L1.0 4.9A10 10 0 0 1 8 3z"/></svg>
        <svg width="25" height="11" viewBox="0 0 25 11" fill="none"><rect x=".5" y=".5" width="21" height="10" rx="2.5" stroke="#f0f6fc" opacity=".6"/><rect x="22.5" y="3.5" width="2" height="4" rx=".5" fill="#f0f6fc" opacity=".6"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#f0f6fc"/></svg>
      </div>
    </div>

    <!-- top chrome -->
    <div class="top-chrome">
      <div class="title-chip glass">
        <svg class="sat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="6" height="6" rx="1"/>
          <path d="M9 9 L3 3 M15 9 L21 3 M9 15 L3 21 M15 15 L21 21"/>
          <circle cx="3" cy="3" r="1.4"/><circle cx="21" cy="3" r="1.4"/>
          <circle cx="3" cy="21" r="1.4"/><circle cx="21" cy="21" r="1.4"/>
        </svg>
        <div>
          <div class="name">ISS — Zarya</div>
          <div class="sub mono"><span class="live-dot-sm"></span>Live tracking</div>
        </div>
      </div>

      <div class="follow glass on">
        <span class="switch on"></span>
        <span class="label">Follow</span>
        <span class="state mono">ON</span>
      </div>
    </div>

    <!-- ISS marker + label -->
    <div class="iss-marker"></div>
    <div class="marker-label glass-soft mono">ISS · 408&thinsp;km</div>

    <!-- map placeholder (corner so it doesn't cover marker) -->
    <div class="map-placeholder glass-soft mono">
      [ Map placeholder · zoom 3 ]
    </div>

    <!-- attribution -->
    <div class="attribution mono">Data: wheretheiss.at · Map: OpenStreetMap</div>

    <!-- chevron-up hint -->
    <div class="chevron-hint">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2 10 9 3 16 10"/>
      </svg>
    </div>

    <!-- BOTTOM SHEET (collapsed, loaded) -->
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-row">
        <div class="status">
          <span class="live-dot"></span>
          <span class="status-label">Live</span>
        </div>
        <div class="coords">
          <span>50.1°&thinsp;N</span>
          <span>118.1°&thinsp;E</span>
        </div>
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2 2M17.4 17.4l2 2M4.6 19.4l2-2M17.4 6.6l2-2"/>
        </svg>
        <span class="timestamp mono">just now</span>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
