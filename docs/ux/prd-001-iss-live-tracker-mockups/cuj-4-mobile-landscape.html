<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ISS — Zarya · mobile landscape (cuj-4-mobile-landscape)</title>
  <meta name="viewport" content="width=844" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0d1117; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; color: #e6edf3; min-width: 844px; -webkit-font-smoothing: antialiased; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }

    /* mobile landscape: 844 wide × 390 tall */
    .device { position: relative; width: 844px; height: 390px; margin: 0 auto; background: #0a0f17; overflow: hidden; }

    /* faux landscape status pills (left edge = notch area, right = system) */
    .lcorner { position: absolute; top: 4px; left: 12px; font-size: 11px; font-weight: 600; color: #f0f6fc; z-index: 30; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .rcorner { position: absolute; top: 4px; right: 12px; display: flex; align-items: center; gap: 6px; z-index: 30; }
    .rcorner svg { display: block; }

    .map { position: absolute; inset: 0; background: #0a0f17; overflow: hidden; }
    .map-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .stars { position: absolute; inset: 0; pointer-events: none; opacity: .3;
      background-image:
        radial-gradient(1px 1px at 18% 24%, rgba(255,255,255,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 62% 14%, rgba(255,255,255,.45) 50%, transparent 51%),
        radial-gradient(1px 1px at 88% 32%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 35% 76%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1px 1px at 78% 82%, rgba(255,255,255,.35) 50%, transparent 51%);
    }
    .vignette { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse at center, transparent 70%, rgba(13,17,23,.55) 100%); }

    .glass { background: rgba(22,27,34,.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(240,246,252,.08); }
    .glass-soft { background: rgba(22,27,34,.62); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(240,246,252,.08); }

    .top-chrome { position: absolute; top: 24px; left: 0; right: 0; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 20; }
    .title-chip { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 10px; }
    .title-chip .sat-icon { color: #7dd3fc; opacity: .9; }
    .title-chip .name { font-size: 13px; font-weight: 500; color: #e6edf3; line-height: 1.2; }
    .title-chip .sub { margin-top: 2px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.14em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
    .live-dot-sm { display:inline-block; width:6px; height:6px; border-radius:999px; background:#22c55e; box-shadow: 0 0 6px rgba(34,197,94,.7); }

    .follow { display: flex; align-items: center; gap: 7px; padding: 6px 11px 6px 7px; border-radius: 999px; width: 108px; border-color: rgba(125,211,252,.45); }
    .switch { display:inline-block; width:24px; height:14px; border-radius:999px; background:#0c3a4a; position:relative; flex:0 0 auto; }
    .switch::after { content:""; position:absolute; top:2px; left:12px; width:10px; height:10px; border-radius:999px; background:#7dd3fc; box-shadow: 0 0 8px rgba(125,211,252,.7); }
    .follow .label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #c9d1d9; }
    .follow .state { margin-left: auto; font-size: 8.5px; color: #7dd3fc; }

    .iss-marker { position: absolute; left: 50%; top: 45%; width: 11px; height: 11px; border-radius: 999px; background: #22d3ee; box-shadow: 0 0 12px 4px rgba(34,211,238,.55), 0 0 28px 10px rgba(34,211,238,.18); transform: translate(-50%, -50%); z-index: 18; }
    .iss-marker::after { content:""; position:absolute; inset:-14px; border-radius:999px; border: 1px solid rgba(34,211,238,.35); animation: markerHalo 2.2s ease-out infinite; }
    @keyframes markerHalo { 0%{transform:scale(.7); opacity:.9;} 80%{transform:scale(1.4); opacity:0;} 100%{opacity:0;} }
    .marker-label { position: absolute; left: calc(50% + 16px); top: calc(45% - 14px); padding: 4px 8px; border-radius: 6px; font-size: 10px; color: #e6edf3; letter-spacing: 0.10em; text-transform: uppercase; font-weight: 500; z-index: 18; }

    .map-placeholder { position: absolute; right: 16px; bottom: 76px; padding: 5px 10px; border-radius: 6px; font-size: 9.5px; color: #8b949e; letter-spacing: 0.1em; text-transform: uppercase; pointer-events: none; z-index: 10; }

    /* Recenter FAB (since this scene has follow ON, FAB is hidden — keeping hook for spec) */

    /* BOTTOM SHEET — shorter (~64px) in landscape */
    .sheet {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(17, 22, 31, 0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(240,246,252,.08);
      box-shadow: 0 -10px 24px -10px rgba(0,0,0,.45);
      padding: 4px 22px 14px;
      z-index: 25;
    }
    .sheet-chevron { display: flex; justify-content: center; padding: 6px 0 2px; color: #6e7681; }
    .sheet-row { display: flex; align-items: center; gap: 16px; padding: 2px 2px; }
    .sheet-row .status { display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto; }
    .live-dot { display:inline-block; width:7px; height:7px; border-radius:999px; background:#22c55e; }
    @keyframes livePulse { 0%,100%{opacity:.65; box-shadow:0 0 4px rgba(34,197,94,.5);} 50%{opacity:1; box-shadow:0 0 10px rgba(34,197,94,.85);} }
    .live-dot { animation: livePulse 1.5s ease-in-out infinite; }
    .sheet-row .status-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #86efac; font-weight: 500; }
    .sheet-row .coords { display: flex; align-items: baseline; gap: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; color: #f0f6fc; font-size: 14px; font-weight: 500; }
    .sheet-row .alt-vel { display: flex; align-items: baseline; gap: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; color: #f0f6fc; font-size: 13px; }
    .sheet-row .alt-vel .unit { color: #6e7681; font-size: 11px; }
    .sheet-row .sun-icon { color: #f59e0b; filter: drop-shadow(0 0 5px rgba(245,158,11,.45)); }
    .sheet-row .timestamp { margin-left: auto; font-size: 11px; color: #8b949e; font-weight: 500; }

    .attribution { position: absolute; left: 16px; bottom: 80px; font-size: 9.5px; color: #6e7681; z-index: 22; }
  </style>
</head>
<body>
  <div class="device">
    <div class="map">
      <div class="stars"></div>
      <!-- Landscape map: use a wider crop, 1.7:1 aspect to match 844:390 = 2.16:1 -->
      <svg class="map-svg" viewBox="500 60 540 250" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <linearGradient id="seaGradL" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0f17"/><stop offset="100%" stop-color="#0e1421"/></linearGradient>
          <pattern id="gridL" width="55.55" height="55.55" patternUnits="userSpaceOnUse"><path d="M 55.55 0 L 0 0 0 55.55" fill="none" stroke="#161c2a" stroke-width="0.5"/></pattern>
        </defs>
        <rect x="-200" y="-100" width="1600" height="800" fill="url(#seaGradL)"/>
        <rect x="-200" y="-100" width="1600" height="800" fill="url(#gridL)"/>
        <line x1="-200" y1="250" x2="1400" y2="250" stroke="#1b2436" stroke-width="0.8" opacity=".7"/>
        <line x1="-200" y1="185" x2="1400" y2="185" stroke="#141a28" stroke-width="0.6" opacity=".6"/>

        <g fill="#1d2638" stroke="#2f3b54" stroke-width="0.7" stroke-linejoin="round">
          <path d="M470,140 L488,128 L505,125 L520,118 L538,120 L552,128 L568,135 L555,148 L548,158 L555,168 L548,178 L530,180 L515,178 L500,182 L488,178 L478,168 L470,158 Z"/>
          <path d="M495,195 L530,190 L560,195 L585,210 L600,235 L598,260 L585,285 L570,310 L558,332 L548,355 L535,375 L520,388 L508,378 L498,358 L490,335 L482,305 L478,278 L478,250 L482,220 Z"/>
          <path d="M555,135 L590,125 L625,118 L665,115 L705,118 L745,125 L780,135 L815,145 L840,158 L855,175 L850,195 L830,208 L805,215 L775,220 L745,225 L720,232 L700,228 L685,218 L670,212 L658,222 L645,232 L632,228 L618,220 L605,210 L595,198 L585,188 L575,175 L565,162 L558,148 Z"/>
          <path d="M688,228 L712,232 L722,250 L715,272 L702,285 L688,278 L680,258 Z"/>
          <path d="M780,255 L805,255 L830,262 L850,272 L840,285 L815,288 L788,282 L772,272 Z"/>
          <path d="M868,170 L880,165 L885,178 L882,195 L872,200 L862,188 Z"/>
        </g>
        <g font-family="ui-sans-serif, system-ui" font-size="9" fill="#3b4a66" letter-spacing="2">
          <text x="490" y="170">EUROPE</text>
          <text x="500" y="250">AFRICA</text>
          <text x="650" y="160">RUSSIA</text>
          <text x="700" y="265">INDIA</text>
          <text x="855" y="190">JAPAN</text>
          <text x="900" y="240">PACIFIC</text>
        </g>

        <!-- Trail behind marker. Marker at (770, 185) — over central Asia -->
        <g stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" fill="none">
          <line x1="762" y1="189" x2="770" y2="185" opacity="1.00"/>
          <line x1="752" y1="194" x2="762" y2="189" opacity="0.85"/>
          <line x1="740" y1="200" x2="752" y2="194" opacity="0.72"/>
          <line x1="727" y1="206" x2="740" y2="200" opacity="0.60"/>
          <line x1="713" y1="213" x2="727" y2="206" opacity="0.50"/>
          <line x1="698" y1="221" x2="713" y2="213" opacity="0.40"/>
          <line x1="682" y1="229" x2="698" y2="221" opacity="0.31"/>
          <line x1="665" y1="238" x2="682" y2="229" opacity="0.23"/>
          <line x1="647" y1="248" x2="665" y2="238" opacity="0.16"/>
        </g>
      </svg>
      <div class="vignette"></div>
    </div>

    <!-- Faux landscape status bar (compact) -->
    <div class="lcorner">9:41</div>
    <div class="rcorner">
      <svg width="14" height="9" viewBox="0 0 17 11"><g fill="#f0f6fc"><rect x="0" y="7" width="3" height="4" rx=".5"/><rect x="4" y="5" width="3" height="6" rx=".5"/><rect x="8" y="3" width="3" height="8" rx=".5"/><rect x="12" y="0" width="3" height="11" rx=".5"/></g></svg>
      <svg width="22" height="10" viewBox="0 0 25 11" fill="none"><rect x=".5" y=".5" width="21" height="10" rx="2.5" stroke="#f0f6fc" opacity=".6"/><rect x="22.5" y="3.5" width="2" height="4" rx=".5" fill="#f0f6fc" opacity=".6"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#f0f6fc"/></svg>
    </div>

    <div class="top-chrome">
      <div class="title-chip glass">
        <svg class="sat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="6" height="6" rx="1"/>
          <path d="M9 9 L3 3 M15 9 L21 3 M9 15 L3 21 M15 15 L21 21"/>
          <circle cx="3" cy="3" r="1.4"/><circle cx="21" cy="3" r="1.4"/><circle cx="3" cy="21" r="1.4"/><circle cx="21" cy="21" r="1.4"/>
        </svg>
        <div><div class="name">ISS — Zarya</div><div class="sub mono"><span class="live-dot-sm"></span>Live tracking</div></div>
      </div>
      <div class="follow glass"><span class="switch"></span><span class="label">Follow</span><span class="state mono">ON</span></div>
    </div>

    <div class="iss-marker"></div>
    <div class="marker-label glass-soft mono">ISS · 408&thinsp;km</div>
    <div class="map-placeholder glass-soft mono">[ Map placeholder · zoom 3 · landscape ]</div>
    <div class="attribution mono">Data: wheretheiss.at · Map: OpenStreetMap</div>

    <!-- Compact landscape sheet (~64px) -->
    <div class="sheet">
      <div class="sheet-chevron">
        <svg width="20" height="12" viewBox="0 0 22 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 11 11 4 19 11"/>
        </svg>
      </div>
      <div class="sheet-row">
        <div class="status"><span class="live-dot"></span><span class="status-label">Live</span></div>
        <div class="coords"><span>43.6°&thinsp;N</span><span>78.2°&thinsp;E</span></div>
        <div class="alt-vel">
          <span><span class="num">408</span><span class="unit"> km</span></span>
          <span style="opacity:.4;">·</span>
          <span><span class="num">27,600</span><span class="unit"> km/h</span></span>
        </div>
        <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.6 4.6l2 2M17.4 17.4l2 2M4.6 19.4l2-2M17.4 6.6l2-2"/>
        </svg>
        <span class="timestamp mono">2s ago</span>
      </div>
    </div>
  </div>
</body>
</html>
